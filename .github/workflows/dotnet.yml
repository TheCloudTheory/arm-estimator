name: Publish ACE packages

on: 
  workflow_dispatch:
  push:
    tags:
      - '*'

defaults:
 run:
  working-directory: ./ace

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration=Release
    - name: Publish Windows
      run: dotnet publish -p:PublishProfile=win-x64
    - name: Publish Linux
      run: dotnet publish -p:PublishProfile=linux-x64
    - name: Publish macOS
      run: dotnet publish -p:PublishProfile=osx-x64
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: win-x64
        path: ${{ github.workspace }}/ace/bin/Release/net8.0/publish/win-x64
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64
        path: ${{ github.workspace }}/ace/bin/Release/net8.0/publish/linux-x64
    - name: Upload MacOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: osx-x64
        path: ${{ github.workspace }}/ace/bin/Release/net8.0/publish/osx-x64
    - name: Create release archives
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd ${{ github.workspace }}/ace/bin/Release/net8.0/publish
        zip -r win-x64.zip win-x64/
        zip -r linux-x64.zip linux-x64/
        zip -r osx-x64.zip osx-x64/
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ github.workspace }}/ace/bin/Release/net8.0/publish/win-x64.zip
          ${{ github.workspace }}/ace/bin/Release/net8.0/publish/linux-x64.zip
          ${{ github.workspace }}/ace/bin/Release/net8.0/publish/osx-x64.zip
