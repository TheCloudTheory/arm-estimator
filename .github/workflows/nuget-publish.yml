name: Publish ACE.Core NuGet package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ace-core/ACE.Core.csproj

      - name: Build
        run: dotnet build ace-core/ACE.Core.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ace-core/ACE.Core.csproj --configuration Release --no-build --output nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
